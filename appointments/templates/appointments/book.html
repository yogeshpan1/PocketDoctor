{% extends "base.html" %}
{% block title %}Book Appointment — Pocket Doctor{% endblock %}

{% block content %}
<div class="form-wrap">
    <p class="page-eyebrow">New Booking</p>
    <h1 class="page-title" style="margin-bottom: 2rem;">Book an Appointment</h1>

    <div class="form-card fade-up">
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="field-group">
                <label class="field-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                    <div class="field-error">{{ error }}</div>
                {% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="btn-form" style="margin-top: 1rem;">Confirm Appointment &rarr;</button>
        </form>
    </div>
</div>
{% endblock %}
