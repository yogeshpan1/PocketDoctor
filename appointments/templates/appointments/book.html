{% extends "home.html" %}
{% block title %}Book Appointment - Pocket Doctor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4 p-4 mt-4">
            <h3 class="fw-bold mb-4">Book an Appointment</h3>
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                        <div class="text-danger small mt-1">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">Book Appointment</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
