{% extends "home.html" %}
{% block title %}Book Appointment - Pocket Doctor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Book an Appointment</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Book Appointment</button>
        </form>
    </div>
</div>
{% endblock %}
